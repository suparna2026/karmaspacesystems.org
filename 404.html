<!DOCTYPE html>

<head>

<style>

  :root { --teal: #2a9d8f; --teal-light: #d0ede9; --ink: #1a2e2b; --muted: #6b8f8a; --border: rgba(42,157,143,0.18); --warm: #e9c46a; }
  body { font-family: 'Inter', sans-serif; background: #f5f8f7; color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
  .code { font-size: 8rem; font-weight: 800; color: var(--teal); line-height: 1; opacity: 0.25; margin-bottom: 1rem; }
  h1 { font-size: 2rem; font-weight: 700; margin-bottom: 1rem; }
  p { color: var(--muted); line-height: 1.7; max-width: 400px; margin-bottom: 2rem; }
  a { background: var(--teal); color: white; padding: 0.85rem 2rem; border-radius: 6px; text-decoration: none; font-weight: 500; transition: opacity 0.2s; }
  a:hover { opacity: 0.85; }
</style>
</head>
